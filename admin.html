<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0, initial-scale=1.0">
    <title>Admin Panel | GadgetFlow - Complete Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0B0E11;
            --bg-secondary: #13161c;
            --surface: #1E2329;
            --surface-2: #2b3139;
            --surface-3: #353d46;
            --text-primary: #EAECEF;
            --text-secondary: #a9aeb8;
            --text-muted: #6c727c;
            --border-color: #2b3139;
            --card-shadow: 0 8px 24px rgba(0,0,0,0.5);
            --accent: #F0B90B;
            --accent-hover: #d9a607;
            --success: #0ecb81;
            --danger: #f6465d;
            --warning: #f39c12;
            --info: #3498db;
        }

        body.light {
            --bg-primary: #f8f9fc;
            --bg-secondary: #ffffff;
            --surface: #ffffff;
            --surface-2: #f0f2f5;
            --surface-3: #e8eaed;
            --text-primary: #1e2329;
            --text-secondary: #5e6673;
            --text-muted: #8a919e;
            --border-color: #eaecef;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--bg-primary);
            min-height: 100vh;
            position: relative;
            padding-bottom: 70px;
        }

        .app-header {
            position: sticky;
            top: 0;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo h2 {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #FCD34D);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .logo span {
            font-size: 0.7rem;
            background: var(--accent);
            color: #000;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            margin-left: 0.5rem;
        }

        .header-actions {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .theme-toggle, .menu-toggle {
            background: var(--surface-2);
            border: 1px solid var(--border-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--accent);
            transition: all 0.2s;
        }

        .sidebar-menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border-color);
            z-index: 200;
            transition: left 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            flex-direction: column;
        }

        .sidebar-menu.open {
            left: 0;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 150;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .sidebar-overlay.open {
            visibility: visible;
            opacity: 1;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .admin-info {
            padding: 1rem;
            background: var(--bg-secondary);
            margin: 1rem;
            border-radius: 20px;
            text-align: center;
        }

        .admin-name {
            font-weight: 700;
            font-size: 1rem;
            color: var(--accent);
        }

        .sidebar-nav {
            flex: 1;
            padding: 0.5rem 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 1.5rem;
            margin: 0.2rem 0;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            border-left: 3px solid transparent;
        }

        .nav-item i {
            width: 24px;
            font-size: 1.2rem;
        }

        .nav-item.active, .nav-item:hover {
            background: var(--surface-2);
            color: var(--accent);
            border-left-color: var(--accent);
        }

        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .logout-btn {
            background: var(--danger);
            border: none;
            padding: 0.8rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .main-content {
            padding: 1rem;
            min-height: calc(100vh - 130px);
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .dashboard-card {
            background: var(--surface);
            border-radius: 24px;
            padding: 1.2rem;
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
            margin-bottom: 1rem;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--border-color);
        }

        .card-header i {
            font-size: 1.3rem;
            color: var(--accent);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .stat-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .stat-title {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
        }

        .table-container {
            overflow-x: auto;
            max-height: 450px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th, td {
            padding: 0.8rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
        }

        th {
            color: var(--accent);
            font-weight: 600;
            position: sticky;
            top: 0;
            background: var(--surface);
            z-index: 10;
        }

        .status-pending { background: rgba(246, 70, 93, 0.15); color: var(--danger); }
        .status-processing { background: rgba(243, 156, 18, 0.15); color: var(--warning); }
        .status-completed { background: rgba(14, 203, 129, 0.15); color: var(--success); }

        .screenshot-preview {
            max-width: 100%;
            max-height: 180px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            cursor: pointer;
        }
        .screenshot-preview:hover {
            border-color: var(--accent);
        }
        .no-screenshot {
            padding: 0.8rem;
            background: var(--bg-secondary);
            border-radius: 12px;
            color: var(--text-muted);
            font-style: italic;
            text-align: center;
            font-size: 0.8rem;
        }

        .btn-sm {
            background: var(--accent);
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: #000;
            font-size: 0.7rem;
            transition: all 0.2s;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .empty-message {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            padding: 0.6rem 0.8rem;
            display: flex;
            justify-content: space-around;
            z-index: 100;
            max-width: 500px;
            margin: 0 auto;
        }

        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.7rem;
            padding: 0.4rem 0.6rem;
            border-radius: 40px;
            transition: all 0.2s;
            flex: 1;
        }

        .bottom-nav-item i {
            font-size: 1.3rem;
        }

        .bottom-nav-item.active {
            color: var(--accent);
            background: var(--surface-2);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: var(--surface);
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            padding: 1.5rem;
        }

        .modal-container input, .modal-container select {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            margin: 0.5rem 0;
            color: var(--text-primary);
        }

        .modal-buttons {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .dashboard-card { animation: fadeInUp 0.3s ease; }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--surface-2); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        @media (min-width: 769px) {
            .app-container { max-width: 100%; padding-bottom: 0; }
            .bottom-nav { display: none; }
            .menu-toggle { display: none; }
            .sidebar-menu { left: 0; width: 280px; transform: none; }
            .sidebar-overlay { display: none; }
            .main-content { margin-left: 280px; padding: 1.5rem; }
            .app-header { margin-left: 280px; width: calc(100% - 280px); }
            .stats-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <div class="logo">
            <h2><i class="fas fa-crown"></i> Admin<span>Panel</span></h2>
        </div>
        <div class="header-actions">
            <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        </div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar-menu" id="sidebarMenu">
        <div class="sidebar-header">
            <div class="logo">
                <h2><i class="fas fa-crown"></i> Admin Control</h2>
            </div>
        </div>
        <div class="admin-info">
            <div class="admin-name"><i class="fas fa-user-shield"></i> Super Admin</div>
            <div style="font-size: 0.65rem; margin-top: 0.3rem;">Full System Access</div>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item active" data-tab="overview"><i class="fas fa-chart-pie"></i> Overview</div>
            <div class="nav-item" data-tab="users"><i class="fas fa-users"></i> Users</div>
            <div class="nav-item" data-tab="vendors"><i class="fas fa-store"></i> Vendors</div>
            <div class="nav-item" data-tab="payments"><i class="fas fa-credit-card"></i> Payments</div>
            <div class="nav-item" data-tab="orders"><i class="fas fa-shopping-cart"></i> Orders</div>
            <div class="nav-item" data-tab="settings"><i class="fas fa-sliders-h"></i> Settings</div>
        </div>
        <div class="sidebar-footer">
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Exit Panel</button>
        </div>
    </div>

    <div class="main-content">
        <h1 class="page-title" id="pageTitle">Overview</h1>
        <div id="contentArea"></div>
    </div>

    <div class="bottom-nav">
        <div class="bottom-nav-item active" data-tab="overview"><i class="fas fa-chart-pie"></i><span>Home</span></div>
        <div class="bottom-nav-item" data-tab="users"><i class="fas fa-users"></i><span>Users</span></div>
        <div class="bottom-nav-item" data-tab="vendors"><i class="fas fa-store"></i><span>Vendors</span></div>
        <div class="bottom-nav-item" data-tab="payments"><i class="fas fa-credit-card"></i><span>Payments</span></div>
        <div class="bottom-nav-item" data-tab="settings"><i class="fas fa-cog"></i><span>Settings</span></div>
    </div>
</div>

<div id="vendorModal" class="modal-overlay">
    <div class="modal-container">
        <h3><i class="fas fa-plus-circle"></i> Add New Vendor</h3>
        <input type="text" id="vendorUsername" placeholder="Username">
        <input type="text" id="vendorDisplayName" placeholder="Display Name">
        <input type="email" id="vendorEmail" placeholder="Email">
        <input type="password" id="vendorPassword" placeholder="Password" value="vendor">
        <div class="modal-buttons">
            <button id="saveVendorBtn" class="btn-sm" style="background:var(--accent);">Save Vendor</button>
            <button id="cancelVendorBtn" class="btn-sm" style="background:var(--surface-2);">Cancel</button>
        </div>
    </div>
</div>

<div id="paymentModal" class="modal-overlay">
    <div class="modal-container">
        <h3><i class="fas fa-edit"></i> Update Status</h3>
        <select id="paymentStatusSelect">
            <option value="pending">Pending</option>
            <option value="processing">Processing</option>
            <option value="completed">Completed</option>
        </select>
        <div class="modal-buttons">
            <button id="confirmPaymentBtn" class="btn-sm" style="background:var(--accent);">Update</button>
            <button id="cancelPaymentBtn" class="btn-sm" style="background:var(--surface-2);">Cancel</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_USERS = "gadgetflow_users";
    const STORAGE_ORDERS = "gadgetflow_orders";
    const STORAGE_VENDORS = "gadgetflow_vendors_list";

    function getUsers() { return JSON.parse(localStorage.getItem(STORAGE_USERS) || "[]"); }
    function getOrders() { return JSON.parse(localStorage.getItem(STORAGE_ORDERS) || "[]"); }
    function getVendors() {
        let vendors = JSON.parse(localStorage.getItem(STORAGE_VENDORS) || "[]");
        if (vendors.length === 0) {
            for (let i = 1; i <= 5; i++) {
                vendors.push({ id: i, username: `vendor${i}`, password: "vendor", displayName: `Vendor ${i}`, email: `vendor${i}@gadgetflow.pk`, status: "active", joined: new Date().toISOString(), totalSales: Math.floor(Math.random()*80000)+10000 });
            }
            localStorage.setItem(STORAGE_VENDORS, JSON.stringify(vendors));
        }
        return vendors;
    }

    function saveVendors(vendors) { localStorage.setItem(STORAGE_VENDORS, JSON.stringify(vendors)); }
    function saveOrders(orders) { localStorage.setItem(STORAGE_ORDERS, JSON.stringify(orders)); }

    function getStats() {
        const orders = getOrders();
        const totalRevenue = orders.reduce((sum, o) => sum + (o.product ? o.product.price : o.amount || 0), 0);
        const pendingAmount = orders.filter(o => o.status === "pending").reduce((sum, o) => sum + (o.product ? o.product.price : o.amount || 0), 0);
        const completedAmount = orders.filter(o => o.status === "completed").reduce((sum, o) => sum + (o.product ? o.product.price : o.amount || 0), 0);

        return {
            totalUsers: getUsers().length,
            totalVendors: getVendors().length,
            totalOrders: orders.length,
            totalRevenue,
            pendingAmount,
            completedAmount,
            avgOrderValue: orders.length > 0 ? Math.round(totalRevenue / orders.length) : 0
        };
    }

    function getRecentOrders() {
        return [...getOrders()].sort((a, b) => b.id - a.id).slice(0, 5);
    }

    function getGroupedOrders() {
        const orders = getOrders();
        const grouped = {};

        orders.forEach(order => {
            const key = order.customer ? (order.customer.email || order.customer.fullName || "Unknown") : "Unknown";
            if (!grouped[key]) {
                grouped[key] = {
                    customerName: order.customer ? order.customer.fullName : "Unknown Customer",
                    email: order.customer ? order.customer.email : "",
                    orders: []
                };
            }
            grouped[key].orders.push(order);
        });

        return Object.values(grouped);
    }

    function renderOverview() {
        const stats = getStats();
        const recentOrders = getRecentOrders();

        return `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-title">Users</div><div class="stat-value">${stats.totalUsers}</div></div>
                <div class="stat-card"><div class="stat-title">Vendors</div><div class="stat-value">${stats.totalVendors}</div></div>
                <div class="stat-card"><div class="stat-title">Orders</div><div class="stat-value">${stats.totalOrders}</div></div>
                <div class="stat-card"><div class="stat-title">Revenue</div><div class="stat-value">₨ ${stats.totalRevenue.toLocaleString()}</div></div>
            </div>

            <div class="dashboard-card">
                <div class="card-header"><i class="fas fa-chart-simple"></i><h3>Revenue Overview</h3></div>
                <div style="text-align:center; padding:0.8rem;">
                    <div style="font-size:2.4rem; font-weight:800; color:var(--accent);">₨ ${stats.totalRevenue.toLocaleString()}</div>
                    <div style="margin:1rem 0; display:flex; justify-content:center; gap:1rem;">
                        <span style="color:var(--danger);">Pending: ₨ ${stats.pendingAmount.toLocaleString()}</span>
                        <span style="color:var(--success);">Completed: ₨ ${stats.completedAmount.toLocaleString()}</span>
                    </div>
                </div>
            </div>

            <div class="dashboard-card">
                <div class="card-header"><i class="fas fa-clock"></i><h3>Recent Orders</h3></div>
                <div class="table-container">
                    <table><thead><tr><th>ID</th><th>Customer</th><th>Product</th><th>Amount</th><th>Status</th></tr></thead><tbody>
                        ${recentOrders.map(o => `
                            <tr>
                                <td>#${o.id}</td>
                                <td>${escapeHtml(o.customer ? o.customer.fullName : (o.customerName || 'N/A'))}</td>
                                <td>${escapeHtml(o.product ? o.product.name : (o.productName || 'N/A'))}</td>
                                <td>₨ ${(o.product ? o.product.price : (o.amount || 0)).toLocaleString()}</td>
                                <td><span class="status-${o.status}">${o.status}</span></td>
                            </tr>
                        `).join('')}
                        ${recentOrders.length === 0 ? '<tr><td colspan="5" class="empty-message">No orders yet</td></tr>' : ''}
                    </tbody></table>
                </div>
            </div>
        `;
    }

    function renderPayments() {
        const groupedOrders = getGroupedOrders();

        let html = `
            <div class="dashboard-card">
                <div class="card-header"><i class="fas fa-credit-card"></i><h3>All Payments (${getOrders().length})</h3></div>
                <div class="table-container">
        `;

        groupedOrders.forEach(group => {
            html += `
                <div style="margin-bottom: 1.5rem; background: var(--surface-2); padding: 1rem; border-radius: 20px;">
                    <h4 style="margin-bottom: 0.8rem; color: var(--accent);">
                        ${escapeHtml(group.customerName)} 
                        <small style="color: var(--text-muted);">(${escapeHtml(group.email)})</small>
                    </h4>
                    <table style="width:100%; border-collapse: collapse;">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Screenshot</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            group.orders.forEach(o => {
                html += `
                    <tr>
                        <td>${escapeHtml(o.product ? o.product.name : 'N/A')}</td>
                        <td>₨ ${(o.product ? o.product.price : 0).toLocaleString()}</td>
                        <td><span class="status-${o.status}">${o.status}</span></td>
                        <td>
                            ${o.screenshotBase64 ? 
                                `<img src="${o.screenshotBase64}" class="screenshot-preview" onclick="showFullImage(this.src)" alt="Screenshot">` : 
                                `<div class="no-screenshot">No screenshot</div>`
                            }
                        </td>
                        <td><button class="btn-sm" onclick="openPaymentModal(${o.id})">Update</button></td>
                    </tr>
                `;
            });

            html += `</tbody></table></div>`;
        });

        if (groupedOrders.length === 0) {
            html += `<div class="empty-message">No payments yet</div>`;
        }

        html += `</div></div>`;
        return html;
    }

    function renderOrders() {
        const groupedOrders = getGroupedOrders();

        let html = `
            <div class="dashboard-card">
                <div class="card-header"><i class="fas fa-shopping-cart"></i><h3>All Orders (${getOrders().length})</h3></div>
                <div class="table-container">
        `;

        groupedOrders.forEach(group => {
            html += `
                <div style="margin-bottom: 1.5rem; background: var(--surface-2); padding: 1rem; border-radius: 20px;">
                    <h4 style="margin-bottom: 0.8rem; color: var(--accent);">
                        ${escapeHtml(group.customerName)} 
                        <small style="color: var(--text-muted);">(${escapeHtml(group.email)})</small>
                    </h4>
                    <table style="width:100%; border-collapse: collapse;">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Screenshot</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            group.orders.forEach(o => {
                html += `
                    <tr>
                        <td>${escapeHtml(o.product ? o.product.name : 'N/A')}</td>
                        <td>₨ ${(o.product ? o.product.price : 0).toLocaleString()}</td>
                        <td><span class="status-${o.status}">${o.status}</span></td>
                        <td>
                            ${o.screenshotBase64 ? 
                                `<img src="${o.screenshotBase64}" class="screenshot-preview" onclick="showFullImage(this.src)" alt="Screenshot">` : 
                                `<div class="no-screenshot">No screenshot</div>`
                            }
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table></div>`;
        });

        if (groupedOrders.length === 0) {
            html += `<div class="empty-message">No orders found</div>`;
        }

        html += `</div></div>`;
        return html;
    }

    function renderUsers() {
        const users = getUsers();
        return `
            <div class="dashboard-card">
                <div class="card-header"><i class="fas fa-users"></i><h3>All Users (${users.length})</h3></div>
                <div class="table-container">
                    <table><thead><tr><th>Name</th><th>Email</th><th>ER Coins</th><th>Action</th></tr></thead><tbody>
                        ${users.map(u => `<tr><td>${escapeHtml(u.name)}</td><td>${escapeHtml(u.email)}</td><td>${u.erCoins || 0}</td><td><button class="btn-sm btn-danger" onclick="deleteUser(${u.id})">Delete</button></td></tr>`).join('')}
                    </tbody></table>
                </div>
            </div>
        `;
    }

    function renderVendors() {
        const vendors = getVendors();
        return `
            <div class="dashboard-card">
                <div class="card-header"><i class="fas fa-store"></i><h3>Vendors (${vendors.length}) <button class="btn-sm" onclick="openAddVendorModal()" style="float:right;">+ Add</button></h3></div>
                <div class="table-container">
                    <table><thead><tr><th>Username</th><th>Name</th><th>Email</th><th>Status</th><th>Actions</th></tr></thead><tbody>
                        ${vendors.map(v => `<tr><td>${escapeHtml(v.username)}</td><td>${escapeHtml(v.displayName)}</td><td>${escapeHtml(v.email)}</td><td><span class="status-${v.status}">${v.status}</span></td><td><button class="btn-sm" onclick="toggleVendorStatus(${v.id})">Toggle</button></td></tr>`).join('')}
                    </tbody></table>
                </div>
            </div>
        `;
    }

    function renderSettings() {
        return `
            <div class="dashboard-card">
                <div class="card-header"><i class="fas fa-cog"></i><h3>System Settings</h3></div>
                <div style="padding:1rem;">
                    <p><strong>Data is shared</strong> with Customer Store & Vendor Dashboard</p>
                    <button class="btn-sm btn-danger" onclick="resetAllData()" style="margin-top:1rem;">Reset All Data</button>
                    <button class="btn-sm" onclick="exportData()" style="margin-top:1rem;">Export All Data</button>
                </div>
            </div>
        `;
    }

    let currentPaymentId = null;
    let currentTab = 'overview';

    window.openPaymentModal = function(orderId) {
        currentPaymentId = orderId;
        const order = getOrders().find(o => o.id === orderId);
        if (order) {
            document.getElementById('paymentStatusSelect').value = order.status || "pending";
            document.getElementById('paymentModal').classList.add('active');
        }
    };

    // ==================== FIXED: Set completedAt when status becomes "completed" ====================
    function updatePaymentStatus() {
        const newStatus = document.getElementById('paymentStatusSelect').value;
        let orders = getOrders();
        const index = orders.findIndex(o => o.id === currentPaymentId);
        
        if (index !== -1) {
            orders[index].status = newStatus;
            
            // IMPORTANT FIX: Set completedAt for customer dashboard
            if (newStatus === "completed" && !orders[index].completedAt) {
                orders[index].completedAt = new Date().toISOString();
            }
            
            saveOrders(orders);
            document.getElementById('paymentModal').classList.remove('active');
            loadTab(currentTab);
        }
    }

    window.showFullImage = function(src) {
        if (!src) return;
        const win = window.open('');
        win.document.write(`<img src="${src}" style="max-width:100%; height:auto; display:block; margin:auto;">`);
    };

    window.deleteUser = function(userId) {
        if (confirm('Delete this user?')) {
            let users = getUsers().filter(u => u.id !== userId);
            localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
            loadTab(currentTab);
        }
    };

    window.toggleVendorStatus = function(vendorId) {
        let vendors = getVendors();
        const v = vendors.find(v => v.id === vendorId);
        if (v) v.status = v.status === 'active' ? 'inactive' : 'active';
        saveVendors(vendors);
        loadTab(currentTab);
    };

    window.openAddVendorModal = function() {
        document.getElementById('vendorModal').classList.add('active');
    };

    function saveVendor() {
        alert("Vendor added successfully (Demo)");
        document.getElementById('vendorModal').classList.remove('active');
        loadTab(currentTab);
    }

    function resetAllData() {
        if (confirm("Reset ALL data?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function exportData() {
        const data = { users: getUsers(), orders: getOrders(), vendors: getVendors() };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `gadgetflow_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    function loadTab(tab) {
        currentTab = tab;
        const contentArea = document.getElementById('contentArea');
        const pageTitle = document.getElementById('pageTitle');

        if (tab === 'overview') {
            contentArea.innerHTML = renderOverview();
            pageTitle.textContent = 'Overview';
        } else if (tab === 'users') {
            contentArea.innerHTML = renderUsers();
            pageTitle.textContent = 'Users';
        } else if (tab === 'vendors') {
            contentArea.innerHTML = renderVendors();
            pageTitle.textContent = 'Vendors';
        } else if (tab === 'payments') {
            contentArea.innerHTML = renderPayments();
            pageTitle.textContent = 'Payments';
        } else if (tab === 'orders') {
            contentArea.innerHTML = renderOrders();
            pageTitle.textContent = 'Orders';
        } else if (tab === 'settings') {
            contentArea.innerHTML = renderSettings();
            pageTitle.textContent = 'Settings';
        }

        document.querySelectorAll('.nav-item, .bottom-nav-item').forEach(item => {
            item.classList.toggle('active', item.getAttribute('data-tab') === tab);
        });
    }

    function initTheme() {
        if (localStorage.getItem('gadgetTheme') === 'light') document.body.classList.add('light');
        updateThemeIcon();
    }

    function updateThemeIcon() {
        const isLight = document.body.classList.contains('light');
        document.getElementById('themeToggle').innerHTML = isLight ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    }

    function toggleTheme() {
        document.body.classList.toggle('light');
        localStorage.setItem('gadgetTheme', document.body.classList.contains('light') ? 'light' : 'dark');
        updateThemeIcon();
    }

    function logout() {
        window.location.href = "index.html";
    }

    document.addEventListener('DOMContentLoaded', () => {
        initTheme();

        document.querySelectorAll('.nav-item, .bottom-nav-item').forEach(item => {
            item.addEventListener('click', () => loadTab(item.getAttribute('data-tab')));
        });

        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('sidebarMenu').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('open');
        });

        document.getElementById('sidebarOverlay').addEventListener('click', () => {
            document.getElementById('sidebarMenu').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('open');
        });

        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        document.getElementById('logoutBtn').addEventListener('click', logout);

        document.getElementById('saveVendorBtn').addEventListener('click', saveVendor);
        document.getElementById('cancelVendorBtn').addEventListener('click', () => document.getElementById('vendorModal').classList.remove('active'));
        document.getElementById('confirmPaymentBtn').addEventListener('click', updatePaymentStatus);
        document.getElementById('cancelPaymentBtn').addEventListener('click', () => document.getElementById('paymentModal').classList.remove('active'));

        loadTab('overview');
    });
</script>
</body>
</html>
