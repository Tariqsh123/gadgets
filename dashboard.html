<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=yes">
    <title>GadgetFlow | ER Coin Wallet Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0B0E11;
            --bg-secondary: #13161c;
            --surface: #1E2329;
            --surface-2: #2b3139;
            --surface-3: #353d46;
            --text-primary: #EAECEF;
            --text-secondary: #a9aeb8;
            --text-muted: #6c727c;
            --border-color: #2b3139;
            --card-shadow: 0 8px 24px rgba(0,0,0,0.5);
            --accent: #F0B90B;
            --accent-hover: #d9a607;
            --success: #0ecb81;
            --danger: #f6465d;
            --sidebar-width: 280px;
            --header-height: 64px;
        }

        body.light {
            --bg-primary: #f8f9fc;
            --bg-secondary: #ffffff;
            --surface: #ffffff;
            --surface-2: #f0f2f5;
            --surface-3: #e8eaed;
            --text-primary: #1e2329;
            --text-secondary: #5e6673;
            --text-muted: #8a919e;
            --border-color: #eaecef;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.2s ease, color 0.2s ease;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Desktop Layout */
        .desktop-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--surface);
            border-right: 1px solid var(--border-color);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header .logo h2 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #FCD34D);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-nav {
            padding: 1.5rem 0;
        }

        .nav-item-sidebar {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1.5rem;
            margin: 0.2rem 0;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            border-left: 3px solid transparent;
        }

        .nav-item-sidebar i {
            width: 24px;
            font-size: 1.2rem;
        }

        .nav-item-sidebar.active, .nav-item-sidebar:hover {
            background: var(--surface-2);
            color: var(--accent);
            border-left-color: var(--accent);
        }

        .sidebar-footer {
            position: sticky;
            bottom: 0;
            width: 100%;
            padding: 1rem;
            border-top: 1px solid var(--border-color);
            background: var(--surface);
            margin-top: auto;
        }

        .main-content-pc {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 1.5rem;
            min-height: 100vh;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-actions-pc {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .icon-btn {
            background: var(--surface-2);
            border: 1px solid var(--border-color);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
        }

        .icon-btn:hover {
            transform: scale(1.05);
            background: var(--surface-3);
        }

        .logout-btn-pc {
            background: var(--accent);
            border: none;
            padding: 0.6rem 1.3rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            color: #000;
        }

        .logout-btn-pc:hover {
            background: var(--danger);
            color: white;
            transform: translateY(-1px);
        }

        /* Cards */
        .dashboard-card {
            background: var(--surface);
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .dashboard-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.6);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--border-color);
        }

        .card-header i {
            font-size: 1.4rem;
            color: var(--accent);
        }

        .card-header h3 {
            font-size: 1.2rem;
            font-weight: 700;
        }

        /* Wallet Boxes */
        .wallet-boxes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.2rem;
            margin-bottom: 1.5rem;
        }

        .wallet-item {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 1.2rem;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .wallet-item:hover {
            transform: translateY(-3px);
        }

        .wallet-item.erc-wallet {
            border-left: 4px solid var(--accent);
        }

        .wallet-item.reward-wallet {
            border-left: 4px solid var(--success);
        }

        .wallet-title {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .wallet-title i {
            font-size: 1.5rem;
        }

        .wallet-title.erc i {
            color: var(--accent);
        }

        .wallet-title.reward i {
            color: var(--success);
        }

        .wallet-title h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .wallet-amount {
            font-size: 2rem;
            font-weight: 800;
            margin: 0.5rem 0;
            letter-spacing: -0.5px;
        }

        .erc-amount {
            color: var(--accent);
        }

        .reward-amount {
            color: var(--success);
        }

        .wallet-info {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        .pending-tag {
            background: rgba(246, 70, 93, 0.15);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            color: var(--danger);
            font-size: 0.7rem;
        }

        .total-section {
            background: linear-gradient(135deg, rgba(240, 185, 11, 0.12), rgba(240, 185, 11, 0.03));
            border-radius: 24px;
            padding: 1.2rem;
            text-align: center;
            border: 1px solid var(--accent);
            margin: 1rem 0;
        }

        .total-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .total-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
        }

        /* Buttons */
        .withdraw-actions {
            margin-top: 1.2rem;
        }

        .withdraw-btn-group {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        .withdraw-action-btn {
            flex: 1;
            min-width: 160px;
            background: var(--accent);
            border: none;
            padding: 0.9rem;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            color: #000;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
        }

        .withdraw-action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .withdraw-action-btn:not(:disabled):hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .withdraw-action-btn.outline {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
        }

        .withdraw-action-btn.outline:not(:disabled):hover {
            background: var(--accent);
            color: #000;
        }

        .info-note {
            background: var(--surface-2);
            border-radius: 20px;
            padding: 0.8rem;
            text-align: center;
            font-size: 0.75rem;
        }

        /* Lists */
        .pending-list, .transactions-container, .referral-list {
            max-height: 320px;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .pending-entry, .transaction-row, .referral-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem;
            background: var(--bg-secondary);
            border-radius: 20px;
            margin-bottom: 0.6rem;
            transition: all 0.2s;
        }

        .pending-entry:hover, .transaction-row:hover {
            background: var(--surface-2);
        }

        .collect-action {
            background: var(--success);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: transform 0.1s;
        }

        .collect-action:active {
            transform: scale(0.96);
        }

        /* Profile */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent), #FCD34D);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar i {
            font-size: 2.8rem;
            color: #000;
        }

        .info-line {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.7rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .info-line i {
            width: 28px;
            color: var(--accent);
        }

        .referral-box {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: 24px;
            margin-top: 1rem;
            text-align: center;
            border: 1px dashed var(--accent);
        }

        .referral-code-text {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--accent);
            font-family: monospace;
            margin: 0.5rem 0;
            letter-spacing: 1px;
        }

        .copy-code-btn, .share-link button {
            background: var(--accent);
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 600;
            color: #000;
            transition: all 0.2s;
        }

        .copy-code-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .stats-grid {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .stat-item {
            flex: 1;
            min-width: 100px;
            background: var(--bg-secondary);
            padding: 0.8rem;
            border-radius: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--accent);
        }

        /* Referrals */
        .referral-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .referral-stat-card {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 1.2rem;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .referral-stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
        }

        .share-link {
            background: var(--surface-2);
            padding: 0.8rem;
            border-radius: 60px;
            display: flex;
            gap: 0.5rem;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .share-link input {
            background: var(--surface);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1rem;
            border-radius: 60px;
            color: var(--text-primary);
            flex: 1;
            font-size: 0.8rem;
            min-width: 180px;
        }

        .referral-bonus-badge {
            background: rgba(14, 203, 129, 0.2);
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.75rem;
            color: var(--success);
            font-weight: 600;
        }

        .empty-message {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        /* Mobile Optimized */
        .mobile-view {
            display: none;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: var(--surface);
            border-radius: 32px;
            width: 90%;
            max-width: 420px;
            padding: 1.8rem;
            border: 1px solid var(--border-color);
        }

        .modal-container input {
            width: 100%;
            padding: 0.9rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 60px;
            margin: 0.8rem 0;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .type-selector {
            display: flex;
            gap: 0.8rem;
            margin: 0.5rem 0;
        }

        .type-selector button {
            flex: 1;
            padding: 0.6rem;
            border-radius: 60px;
            background: var(--surface-2);
            border: 1px solid var(--border-color);
            cursor: pointer;
            color: var(--text-primary);
            font-weight: 500;
            transition: all 0.2s;
        }

        .type-selector button.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .w-100 { width: 100%; }
        .mt-2 { margin-top: 0.8rem; }
        .text-center { text-align: center; }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            .desktop-layout { display: none; }
            .mobile-view { display: block; min-height: 100vh; padding-bottom: 80px; background: var(--bg-primary); }
            
            .mobile-header {
                background: var(--surface);
                padding: 1rem;
                border-bottom: 1px solid var(--border-color);
                display: flex;
                justify-content: space-between;
                align-items: center;
                position: sticky;
                top: 0;
                z-index: 100;
                backdrop-filter: blur(10px);
                background: rgba(var(--surface-rgb, 30,35,41), 0.95);
            }
            
            .mobile-content {
                padding: 1rem;
                padding-bottom: 20px;
            }
            
            .mobile-card {
                background: var(--surface);
                border-radius: 28px;
                padding: 1.2rem;
                margin-bottom: 1rem;
                border: 1px solid var(--border-color);
            }
            
            .wallet-boxes {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .withdraw-btn-group {
                flex-direction: column;
            }
            
            .withdraw-action-btn {
                width: 100%;
            }
            
            .stats-grid {
                flex-direction: column;
            }
            
            .stat-item {
                width: 100%;
            }
            
            .referral-stats-grid {
                grid-template-columns: 1fr;
            }
            
            .share-link {
                flex-direction: column;
            }
            
            .share-link input {
                width: 100%;
            }
            
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            
            .card-header h3 {
                font-size: 1.1rem;
            }
            
            .page-title {
                font-size: 1.4rem;
            }
            
            .top-bar {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border-color);
            padding: 0.6rem 0.8rem;
            display: flex;
            justify-content: space-around;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(var(--surface-rgb, 30,35,41), 0.98);
        }

        .mobile-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.7rem;
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
        }

        .mobile-nav-item i {
            font-size: 1.3rem;
        }

        .mobile-nav-item.active {
            color: var(--accent);
            background: var(--surface-2);
        }

        .mobile-nav-item:active {
            transform: scale(0.95);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--surface-2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="desktop-layout">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo" id="backToStoreDesktop">
                <h2><i class="fas fa-bolt"></i> GadgetFlow</h2>
            </div>
        </div>
        <div class="sidebar-nav">
            <div class="nav-item-sidebar active" data-tab="profile"><i class="fas fa-user"></i> <span>Profile</span></div>
            <div class="nav-item-sidebar" data-tab="wallet"><i class="fas fa-wallet"></i> <span>Wallet</span></div>
            <div class="nav-item-sidebar" data-tab="withdraw"><i class="fas fa-clock"></i> <span>Withdrawals</span></div>
            <div class="nav-item-sidebar" data-tab="history"><i class="fas fa-history"></i> <span>History</span></div>
            <div class="nav-item-sidebar" data-tab="referrals"><i class="fas fa-users"></i> <span>Referrals</span></div>
        </div>
        <div class="sidebar-footer">
            <button class="logout-btn-pc w-100" id="logoutDesktop"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>
    <div class="main-content-pc" id="desktopContent"></div>
</div>

<div class="mobile-view">
    <div class="mobile-header">
        <div class="logo" id="backToStoreMobile"><h2 style="font-size: 1.3rem;"><i class="fas fa-bolt"></i> GadgetFlow</h2></div>
        <div class="header-actions-pc">
            <button class="icon-btn" id="themeToggleMobile"><i class="fas fa-moon"></i></button>
            <button class="logout-btn-pc" id="logoutMobile" style="padding: 0.4rem 1rem;"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>
    <div class="mobile-content" id="mobileContent"></div>
    <div class="bottom-nav">
        <div class="mobile-nav-item active" data-tab="profile"><i class="fas fa-user"></i><span>Profile</span></div>
        <div class="mobile-nav-item" data-tab="wallet"><i class="fas fa-wallet"></i><span>Wallet</span></div>
        <div class="mobile-nav-item" data-tab="withdraw"><i class="fas fa-clock"></i><span>Withdraw</span></div>
        <div class="mobile-nav-item" data-tab="history"><i class="fas fa-list"></i><span>History</span></div>
        <div class="mobile-nav-item" data-tab="referrals"><i class="fas fa-users"></i><span>Refer</span></div>
    </div>
</div>

<div id="withdrawModal" class="modal-overlay">
    <div class="modal-container">
        <h3 style="margin-bottom: 1rem;">Request Withdrawal</h3>
        <div class="type-selector" id="withdrawTypeSelector">
            <button class="active" data-type="reward">Reward</button>
            <button data-type="total">Total Amount</button>
        </div>
        <p id="withdrawInfoText" style="font-size:0.8rem; margin: 0.5rem 0; color: var(--text-muted);">Minimum 100 ERC</p>
        <input type="number" id="withdrawAmountInput" placeholder="Enter amount in ERC" min="100">
        <div class="modal-buttons">
            <button id="confirmWithdrawBtn" style="background: var(--accent); flex:1; padding:0.8rem; border-radius:60px; border:none; font-weight:bold; cursor:pointer;">Confirm</button>
            <button id="cancelWithdrawBtn" style="background: var(--surface-2); flex:1; padding:0.8rem; border-radius:60px; border:none; cursor:pointer;">Cancel</button>
        </div>
        <div id="withdrawErrorMsg" style="font-size:0.75rem; color: var(--danger); margin-top:0.8rem;"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
<script>
    // Storage & Core Logic (same robust system)
    const STORAGE_USERS = "gadgetflow_users_final";
    const STORAGE_SESSION = "gadgetflow_session_final";
    const STORAGE_REFERRALS = "gadgetflow_referrals_data";

    function getUserTxKey(email) { return `gadgetflow_tx_${email}`; }
    function getUserWdKey(email) { return `gadgetflow_wd_${email}`; }
    function generateReferralCode(name, email) {
        const prefix = (name.substring(0,3) + email.substring(0,3)).toUpperCase().replace(/[^A-Z]/g, '');
        return `GF${prefix}${Math.floor(1000 + Math.random() * 9000)}`;
    }
    function getUsers() { return JSON.parse(localStorage.getItem(STORAGE_USERS) || "[]"); }
    function saveUsers(u) { localStorage.setItem(STORAGE_USERS, JSON.stringify(u)); }
    function getSession() { return JSON.parse(localStorage.getItem(STORAGE_SESSION) || "null"); }
    function setSession(u) { localStorage.setItem(STORAGE_SESSION, JSON.stringify(u)); }
    function clearSession() { localStorage.removeItem(STORAGE_SESSION); }
    function getCurrentUser() { return getSession(); }
    function getUserTransactions(email) { return JSON.parse(localStorage.getItem(getUserTxKey(email)) || "[]"); }
    function saveUserTransactions(email, txs) { localStorage.setItem(getUserTxKey(email), JSON.stringify(txs)); }
    function addTransaction(email, tx) { let txs = getUserTransactions(email); txs.unshift({ ...tx, id: Date.now(), date: new Date().toLocaleString() }); saveUserTransactions(email, txs); }
    function getUserWithdrawals(email) { return JSON.parse(localStorage.getItem(getUserWdKey(email)) || "[]"); }
    function saveUserWithdrawals(email, wds) { localStorage.setItem(getUserWdKey(email), JSON.stringify(wds)); }
    function addWithdrawal(email, amount, type) { let wds = getUserWithdrawals(email); const availableTime = Date.now() + (34 + Math.random() * 14) * 60 * 60 * 1000; wds.push({ id: Date.now(), amount, type, requestedAt: Date.now(), availableAt: availableTime, status: 'pending', createdAt: new Date().toLocaleString() }); saveUserWithdrawals(email, wds); return availableTime; }
    
    // Referral System
    function getReferralData() { return JSON.parse(localStorage.getItem(STORAGE_REFERRALS) || "{}"); }
    function saveReferralData(data) { localStorage.setItem(STORAGE_REFERRALS, JSON.stringify(data)); }
    function addReferral(referrerCode, referredEmail, referredName) { let refData = getReferralData(); if(!refData[referrerCode]) refData[referrerCode] = []; if(!refData[referrerCode].some(r => r.email === referredEmail)) { refData[referrerCode].push({ email: referredEmail, name: referredName, date: new Date().toISOString(), bonusPaid: false }); saveReferralData(refData); const users = getUsers(); const referrerUser = users.find(u => u.referralCode === referrerCode); if(referrerUser && !refData[referrerCode].find(r => r.email === referredEmail)?.bonusPaid) { referrerUser.erCoins = (referrerUser.erCoins || 0) + 30; saveUsers(users); addTransaction(referrerUser.email, { type: "credit", amount: 30, productName: "Referral Bonus" }); if(referrerUser.email === getCurrentUser()?.email) setSession(referrerUser); const entry = refData[referrerCode].find(r => r.email === referredEmail); if(entry) entry.bonusPaid = true; saveReferralData(refData); } } }
    function getReferralsForUser(user) { if(!user || !user.referralCode) return []; const refData = getReferralData(); return refData[user.referralCode] || []; }
    function getReferralStats(user) { const referrals = getReferralsForUser(user); return { totalReferrals: referrals.length, totalBonusEarned: referrals.length * 30 }; }
    function getRewardBalance(email) { return getUserTransactions(email).filter(t => t.type === "credit").reduce((s, t) => s + t.amount, 0); }
    function getPendingWithdrawalAmount(email, type = null) { const wds = getUserWithdrawals(email); if(type) return wds.filter(w => w.status === 'pending' && w.type === type).reduce((s, w) => s + w.amount, 0); return wds.filter(w => w.status === 'pending').reduce((s, w) => s + w.amount, 0); }
    function getAvailableRewardBalance(email) { return Math.max(0, getRewardBalance(email) - getPendingWithdrawalAmount(email, 'reward')); }
    function getERCoinBalance(user) { return (user.erCoins || 0) + (user.planBalance || 0); }
    function getTotalBalance(user) { return getRewardBalance(user.email) + getERCoinBalance(user); }
    function getAvailableTotalBalance(user) { return Math.max(0, getTotalBalance(user) - getPendingWithdrawalAmount(user.email)); }
    
    function seedDemoUser() {
        let users = getUsers();
        if(!users.find(u => u.email === "demo@gadgetflow.com")) {
            let demoUser = { id: 999, name: "Alex Johnson", email: "demo@gadgetflow.com", password: "demo123", erCoins: 1250, planBalance: 500, referralCode: generateReferralCode("Alex Johnson", "demo@gadgetflow.com"), joined: new Date().toISOString() };
            users.push(demoUser);
            saveUsers(users);
            saveUserTransactions("demo@gadgetflow.com", [{ type: "credit", amount: 35, productName: "Mobile Holder Purchase" }, { type: "credit", amount: 80, productName: "Powerbank Purchase" }, { type: "credit", amount: 125, productName: "RGB Keyboard Purchase" }].map(tx => ({ ...tx, id: Date.now(), date: new Date().toLocaleString() })));
            addReferral(demoUser.referralCode, "friend@example.com", "Jane Doe");
        }
    }
    function checkAuth() { if(!getCurrentUser()) { window.location.href = "index.html"; return false; } return true; }
    
    let currentWithdrawType = 'reward';
    function showWithdrawModal(type) { const user = getCurrentUser(); if(!user) return; currentWithdrawType = type; const available = type === 'reward' ? getAvailableRewardBalance(user.email) : getAvailableTotalBalance(user); document.getElementById('withdrawInfoText').innerHTML = `${type === 'reward' ? 'Reward Wallet' : 'Total Balance'}: ${available.toLocaleString()} ERC available • Min 100 ERC`; document.getElementById('withdrawAmountInput').value = ''; document.getElementById('withdrawAmountInput').max = available; document.getElementById('withdrawErrorMsg').innerHTML = ''; document.querySelectorAll('#withdrawTypeSelector button').forEach(btn => { if((type === 'reward' && btn.getAttribute('data-type') === 'reward') || (type === 'total' && btn.getAttribute('data-type') === 'total')) btn.classList.add('active'); else btn.classList.remove('active'); }); document.getElementById('withdrawModal').classList.add('active'); }
    function confirmWithdrawalAction() { const user = getCurrentUser(); if(!user) return; let amount = parseInt(document.getElementById('withdrawAmountInput').value); const available = currentWithdrawType === 'reward' ? getAvailableRewardBalance(user.email) : getAvailableTotalBalance(user); if(isNaN(amount) || amount < 100) { document.getElementById('withdrawErrorMsg').innerHTML = 'Minimum withdrawal is 100 ERC'; return; } if(amount > available) { document.getElementById('withdrawErrorMsg').innerHTML = `Only ${available.toLocaleString()} ERC available`; return; } let users = getUsers(); let idx = users.findIndex(u => u.email === user.email); if(idx !== -1 && currentWithdrawType === 'total') { let remaining = amount; let erDeduct = Math.min(users[idx].erCoins || 0, remaining); users[idx].erCoins = (users[idx].erCoins || 0) - erDeduct; remaining -= erDeduct; if(remaining > 0) { let planDeduct = Math.min(users[idx].planBalance || 0, remaining); users[idx].planBalance = (users[idx].planBalance || 0) - planDeduct; } saveUsers(users); setSession({ ...user, erCoins: users[idx].erCoins, planBalance: users[idx].planBalance }); } addWithdrawal(user.email, amount, currentWithdrawType); addTransaction(user.email, { type: "debit", amount, productName: `${currentWithdrawType === 'reward' ? 'Reward' : 'Total'} Withdrawal Request` }); document.getElementById('withdrawModal').classList.remove('active'); renderDesktop(); renderMobile(); }
    window.collectWithdrawalNow = function(id, amount) { const user = getCurrentUser(); let wds = getUserWithdrawals(user.email); const w = wds.find(w => w.id === id); if(w && Date.now() >= w.availableAt) { saveUserWithdrawals(user.email, wds.filter(w => w.id !== id)); addTransaction(user.email, { type: "debit", amount, productName: "Withdrawal Collected" }); alert(`✓ ${amount} ERC withdrawn`); renderDesktop(); renderMobile(); } else alert('⏳ Not ready yet. Please wait 34-48 hours.'); };
    window.copyReferral = function() { const user = getCurrentUser(); if(user?.referralCode) { navigator.clipboard.writeText(user.referralCode); alert('Referral code copied!'); } };
    window.copyInviteLink = function() { const user = getCurrentUser(); if(user?.referralCode) { const link = `${window.location.origin}/signup?ref=${user.referralCode}`; navigator.clipboard.writeText(link); alert('Invite link copied!'); } };
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    // Render Functions (compact but full)
    function renderReferralsPage(user) { const refs = getReferralsForUser(user); const stats = getReferralStats(user); const link = `${window.location.origin}/signup?ref=${user.referralCode}`; return `<div class="referral-stats-grid"><div class="referral-stat-card"><div class="referral-stat-number">${stats.totalReferrals}</div><div>Total Referrals</div></div><div class="referral-stat-card"><div class="referral-stat-number">${stats.totalBonusEarned} ERC</div><div>Bonus Earned</div></div></div><div class="share-link"><input type="text" readonly value="${link}" id="inviteLinkInput"><button class="copy-code-btn" onclick="copyInviteLink()">Copy Link</button></div><div class="referral-box"><div>Your Referral Code</div><div class="referral-code-text">${user.referralCode}</div><button class="copy-code-btn" onclick="copyReferral()">Copy Code</button></div><div style="margin-top:1rem;"><h4 style="margin-bottom:0.8rem;">Referred Friends</h4><div class="referral-list">${refs.length === 0 ? '<div class="empty-message">No referrals yet. Share your code!</div>' : refs.map(r => `<div class="referral-entry"><div><i class="fas fa-user-friends"></i> ${escapeHtml(r.name)}<br><small>${new Date(r.date).toLocaleDateString()}</small></div><div class="referral-bonus-badge">+30 ERC</div></div>`).join('')}</div></div><div class="info-note mt-2"><i class="fas fa-gift"></i> Earn 30 ER Coins per referral!</div>`; }
    function renderWalletPage(user) { const er = getERCoinBalance(user); const reward = getRewardBalance(user.email); const pendingReward = getPendingWithdrawalAmount(user.email, 'reward'); const availReward = reward - pendingReward; const total = er + reward; const availTotal = total - getPendingWithdrawalAmount(user.email); return `<div class="wallet-boxes"><div class="wallet-item erc-wallet"><div class="wallet-title erc"><i class="fas fa-coins"></i><h4>ER Coin Balance</h4></div><div class="wallet-amount erc-amount">${er.toLocaleString()} ERC</div><div class="wallet-info"><span>Available</span><span>${er.toLocaleString()} ERC</span></div></div><div class="wallet-item reward-wallet"><div class="wallet-title reward"><i class="fas fa-star"></i><h4>Reward</h4></div><div class="wallet-amount reward-amount">${reward.toLocaleString()} ERC</div><div class="wallet-info"><span>Available: ${availReward.toLocaleString()} ERC</span>${pendingReward > 0 ? `<span class="pending-tag">Pending: ${pendingReward.toLocaleString()}</span>` : ''}</div></div></div><div class="total-section"><div class="total-label">Total Portfolio</div><div class="total-value">${total.toLocaleString()} ERC</div><div class="total-label">Available: ${availTotal.toLocaleString()} ERC</div></div><div class="withdraw-actions"><div class="withdraw-btn-group"><button class="withdraw-action-btn" id="withdrawRewardBtn" ${availReward < 100 ? 'disabled' : ''}>Withdraw Reward<small>Min 100 ERC</small></button><button class="withdraw-action-btn outline" id="withdrawTotalBtn" ${availTotal < 100 ? 'disabled' : ''}>Withdraw Total<small>Reward + ER Coin</small></button></div><div class="info-note"><i class="fas fa-hourglass-half"></i> 34-48h processing • Collect when ready</div></div>`; }
    function renderPendingWithdrawals(user) { const wds = getUserWithdrawals(user.email).filter(w => w.status === 'pending'); if(!wds.length) return '<div class="empty-message">No pending withdrawals</div>'; return wds.map(w => { const ready = Date.now() >= w.availableAt; const hours = Math.ceil((w.availableAt - Date.now()) / 3600000); return `<div class="pending-entry"><div><h5>${w.amount.toLocaleString()} ERC</h5><small>${w.type === 'reward' ? 'Reward' : 'Total'} Withdrawal</small><div style="font-size:0.7rem;">${ready ? '✓ Ready' : `⏰ ~${hours}h`}</div></div>${ready ? `<button class="collect-action" onclick="collectWithdrawalNow(${w.id}, ${w.amount})">Collect</button>` : '<i class="fas fa-hourglass-half"></i>'}</div>`; }).join(''); }
    function renderProfile(user, txs) { const earned = txs.filter(t => t.type === "credit").reduce((s, t) => s + t.amount, 0); const er = getERCoinBalance(user); return `<div class="profile-header"><div class="avatar"><i class="fas fa-user"></i></div><div><h3>${escapeHtml(user.name)}</h3><p>${escapeHtml(user.email)}</p></div></div><div class="info-line"><i class="fas fa-calendar"></i><span>Member since: ${new Date(user.joined).toLocaleDateString()}</span></div><div class="stats-grid"><div class="stat-item"><div class="stat-number">${earned.toLocaleString()}</div><div>Reward Earned</div></div><div class="stat-item"><div class="stat-number">${er.toLocaleString()}</div><div>ER Coin</div></div><div class="stat-item"><div class="stat-number">${(earned+er).toLocaleString()}</div><div>Total</div></div></div>`; }
    function renderTransactions(txs) { if(!txs.length) return '<div class="empty-message">No transactions</div>'; return txs.map(tx => `<div class="transaction-row"><div class="transaction-left"><div class="transaction-icon"><i class="fas ${tx.type === 'credit' ? 'fa-arrow-down' : 'fa-arrow-up'}"></i></div><div><div>${escapeHtml(tx.productName)}</div><div style="font-size:0.7rem;">${tx.date}</div></div></div><div class="transaction-amount ${tx.type === 'credit' ? 'positive' : 'negative'}">${tx.type === 'credit' ? '+' : '-'}${tx.amount.toLocaleString()} ERC</div></div>`).join(''); }
    
    function renderDesktop() { const user = getCurrentUser(); if(!user) return; const tab = document.querySelector('.nav-item-sidebar.active')?.getAttribute('data-tab') || 'profile'; const txs = getUserTransactions(user.email); let content = ''; if(tab === 'profile') content = `<div class="dashboard-card"><div class="card-header"><i class="fas fa-user"></i><h3>Profile</h3></div>${renderProfile(user, txs)}</div>`; else if(tab === 'wallet') content = `<div class="dashboard-card"><div class="card-header"><i class="fas fa-wallet"></i><h3>Wallet</h3></div>${renderWalletPage(user)}</div>`; else if(tab === 'withdraw') content = `<div class="dashboard-card"><div class="card-header"><i class="fas fa-clock"></i><h3>Pending Withdrawals</h3></div>${renderPendingWithdrawals(user)}<div class="info-note mt-2">Funds available after 34-48h</div></div>`; else if(tab === 'history') content = `<div class="dashboard-card"><div class="card-header"><i class="fas fa-history"></i><h3>Transaction History</h3></div><div class="transactions-container">${renderTransactions(txs)}</div></div>`; else if(tab === 'referrals') content = `<div class="dashboard-card"><div class="card-header"><i class="fas fa-users"></i><h3>Referral Program</h3></div>${renderReferralsPage(user)}</div>`; document.getElementById('desktopContent').innerHTML = `<div class="top-bar"><h1 class="page-title">${tab.charAt(0).toUpperCase()+tab.slice(1)}</h1><div class="header-actions-pc"><button class="icon-btn" id="themeToggleDesktop"><i class="fas fa-moon"></i></button></div></div>${content}`; document.getElementById('withdrawRewardBtn')?.addEventListener('click', () => showWithdrawModal('reward')); document.getElementById('withdrawTotalBtn')?.addEventListener('click', () => showWithdrawModal('total')); document.getElementById('themeToggleDesktop')?.addEventListener('click', toggleTheme); }
    function renderMobile() { const user = getCurrentUser(); if(!user) return; const tab = document.querySelector('.mobile-nav-item.active')?.getAttribute('data-tab') || 'profile'; const txs = getUserTransactions(user.email); let content = ''; if(tab === 'profile') content = `<div class="mobile-card">${renderProfile(user, txs)}</div>`; else if(tab === 'wallet') content = `<div class="mobile-card">${renderWalletPage(user)}</div>`; else if(tab === 'withdraw') content = `<div class="mobile-card"><h3 style="margin-bottom:1rem;">Pending Withdrawals</h3>${renderPendingWithdrawals(user)}</div>`; else if(tab === 'history') content = `<div class="mobile-card"><h3>Transaction History</h3>${renderTransactions(txs)}</div>`; else if(tab === 'referrals') content = `<div class="mobile-card">${renderReferralsPage(user)}</div>`; document.getElementById('mobileContent').innerHTML = content; document.getElementById('withdrawRewardBtn')?.addEventListener('click', () => showWithdrawModal('reward')); document.getElementById('withdrawTotalBtn')?.addEventListener('click', () => showWithdrawModal('total')); }
    
    function initTheme() { const saved = localStorage.getItem('gadgetTheme'); if(saved === 'light') document.body.classList.add('light'); updateThemeIcons(); }
    function updateThemeIcons() { const isLight = document.body.classList.contains('light'); const icon = isLight ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>'; if(document.getElementById('themeToggleDesktop')) document.getElementById('themeToggleDesktop').innerHTML = icon; if(document.getElementById('themeToggleMobile')) document.getElementById('themeToggleMobile').innerHTML = icon; }
    function toggleTheme() { document.body.classList.toggle('light'); localStorage.setItem('gadgetTheme', document.body.classList.contains('light') ? 'light' : 'dark'); updateThemeIcons(); }
    function logout() { clearSession(); window.location.href = "index.html"; }
    function goToStore() { window.location.href = "index.html"; }
    function setupTabs() { document.querySelectorAll('.nav-item-sidebar').forEach(t => t.addEventListener('click', () => { document.querySelectorAll('.nav-item-sidebar').forEach(n => n.classList.remove('active')); t.classList.add('active'); renderDesktop(); })); document.querySelectorAll('.mobile-nav-item').forEach(t => t.addEventListener('click', () => { document.querySelectorAll('.mobile-nav-item').forEach(n => n.classList.remove('active')); t.classList.add('active'); renderMobile(); })); }
    
    document.addEventListener('DOMContentLoaded', () => { seedDemoUser(); initTheme(); if(!checkAuth()) return; setupTabs(); renderDesktop(); renderMobile(); document.getElementById('logoutDesktop')?.addEventListener('click', logout); document.getElementById('logoutMobile')?.addEventListener('click', logout); document.getElementById('backToStoreDesktop')?.addEventListener('click', goToStore); document.getElementById('backToStoreMobile')?.addEventListener('click', goToStore); document.getElementById('themeToggleMobile')?.addEventListener('click', toggleTheme); document.getElementById('confirmWithdrawBtn')?.addEventListener('click', confirmWithdrawalAction); document.getElementById('cancelWithdrawBtn')?.addEventListener('click', () => document.getElementById('withdrawModal').classList.remove('active')); document.querySelectorAll('#withdrawTypeSelector button').forEach(btn => btn.addEventListener('click', () => { if(document.getElementById('withdrawModal').classList.contains('active')) { const type = btn.getAttribute('data-type'); currentWithdrawType = type; const user = getCurrentUser(); if(user) { const avail = type === 'reward' ? getAvailableRewardBalance(user.email) : getAvailableTotalBalance(user); document.getElementById('withdrawInfoText').innerHTML = `${type === 'reward' ? 'Reward' : 'Total'}: ${avail.toLocaleString()} ERC available`; document.getElementById('withdrawAmountInput').max = avail; } btn.classList.add('active'); document.querySelectorAll('#withdrawTypeSelector button').forEach(b => { if(b !== btn) b.classList.remove('active'); }); } })); });
</script>
